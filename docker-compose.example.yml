services:
  jellyreaper:
    image: ghcr.io/alice-wondered/jellyreaper:latest
    pull_policy: always
    container_name: jellyreaper
    restart: unless-stopped
    ports:
      - "6767:6767"
    env_file:
      - .env
    environment:
      HTTP_PORT: "6767"
      HTTP_ADDR: ":6767"
      DB_PATH: /data/jellyreaper.db
      LOG_DIR: /logs
      EMBED_PERSIST_DIR: /embeds
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./embeds:/embeds
